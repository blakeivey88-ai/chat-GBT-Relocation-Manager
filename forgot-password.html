<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#071d3b" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="Request a password reset for Relocation Manager USA." />
  <title>Forgot Password · Relocation Manager USA</title>
  <link rel="canonical" href="https://relocationmanagerusa.com/forgot-password" />
  <link rel="stylesheet" href="/styles.css?v=20260718-2" />
  <style>
    body{margin:0;background:linear-gradient(180deg,#071d3b 0%,#edf3f9 100%);font-family:Inter,system-ui,sans-serif;color:#172033}
    .wrap{min-height:100svh;display:grid;place-items:start center;padding:clamp(20px,4vw,56px) 16px 32px}
    .card{width:min(100%,560px);background:#fff;border:1px solid #dce6f0;border-radius:28px;box-shadow:0 28px 80px rgba(13,31,59,.12);padding:clamp(24px,3vw,38px);display:grid;gap:16px}
    .brand{color:#fff;display:flex;align-items:center;gap:12px;font-weight:950;font-size:clamp(24px,3vw,34px)}
    .brand .mark{display:grid;place-items:center;width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.12)}
    h1,h2,p{margin:0}
    .muted{color:#64748b;line-height:1.5}
    .form{display:grid;gap:12px}
    label{display:grid;gap:6px;font-size:12px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#5d6d82}
    input{min-height:48px;padding:12px 14px;border-radius:14px;border:1px solid #d8e2ee;background:#fbfdff;font-size:16px}
    input:focus{outline:3px solid rgba(29,78,216,.18);border-color:#7db1ff;background:#fff}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row .btn{min-height:48px;border-radius:14px}
    .status{display:grid;gap:6px;border-radius:14px;padding:13px 15px;font-weight:750;display:none}
    .status[data-tone="info"]{background:#eef6ff;border:1px solid #cbdcf5;color:#123e77}
    .status[data-tone="success"]{background:#eaf7ef;border:1px solid #b9dfc6;color:#176835}
    .status[data-tone="error"]{background:#fff1f1;border:1px solid #f0bbbb;color:#9d1c1c}
    .footer{font-size:13px;color:#6b7b90;line-height:1.5}
    .spinner{width:14px;height:14px;border-radius:999px;border:2px solid currentColor;border-right-color:transparent;display:inline-block;animation:spin .8s linear infinite;vertical-align:-2px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="wrap">
    <div style="width:min(100%,560px);display:grid;gap:16px;">
      <div class="brand"><span class="mark">🦅</span><span>Relocation <b>Manager USA</b></span></div>
      <article class="card">
        <h1>Forgot your password?</h1>
        <p class="muted">Enter your email and we’ll prepare a reset link if the account exists.</p>
        <form class="form" id="forgotForm" novalidate>
          <label>Email address<input name="email" type="email" autocomplete="email" required placeholder="you@company.com" /></label>
          <div class="row">
            <button class="btn btn-primary" type="submit"><span class="button-text">Send reset link</span></button>
            <a class="btn btn-soft" href="/signin">Back to sign in</a>
          </div>
        </form>
        <div class="status" id="status" role="alert" aria-live="polite" aria-atomic="true"></div>
        <p class="footer">If you don’t see the email, check spam or try again later.</p>
      </article>
    </div>
  </main>
  <script>
    const form=document.getElementById('forgotForm');
    const statusBox=document.getElementById('status');
    const buttonText=form?.querySelector('.button-text');
    let csrfToken='';

    function showStatus(message,tone='info'){if(!statusBox) return;statusBox.style.display='grid';statusBox.dataset.tone=tone;statusBox.textContent=message;}
    function setBusy(next){const btn=form?.querySelector('button[type="submit"]');if(!btn) return;btn.disabled=next;if(buttonText) buttonText.innerHTML=next?'<span class="spinner" aria-hidden="true"></span> Sending…':'Send reset link';}
    async function seedCsrf(){try{const res=await fetch('/api/account',{credentials:'include'});const data=await res.json().catch(()=>null);if(data?.csrfToken) csrfToken=String(data.csrfToken||'');}catch{}}
    form?.addEventListener('submit',async e=>{e.preventDefault();const email=String(form.querySelector('[name="email"]')?.value||'').trim();if(!email){showStatus('Enter your email address.','error');return}setBusy(true);showStatus('Preparing reset link…');try{const res=await fetch('/api/account',{method:'POST',credentials:'include',headers:{'content-type':'application/json','x-csrf-token':csrfToken||''},body:JSON.stringify({action:'request-reset',email})});const data=await res.json().catch(()=>null);if(data?.csrfToken) csrfToken=String(data.csrfToken||'');if(!res.ok) throw data;showStatus('If that account exists, a reset link is ready. Check your email.','success');form.reset()}catch(err){showStatus((err&&err.error)||'Could not start password reset right now.','error')}finally{setBusy(false)}});
    seedCsrf();
  </script>
</body>
</html>
