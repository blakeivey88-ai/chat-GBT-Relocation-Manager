<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071d3b"/><stop offset="0.58" stop-color="#153f6d"/><stop offset="1" stop-color="#b22234"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#071d3b" flood-opacity=".23"/></filter></defs>
<style>
  .bg{fill:url(#g)} .card{fill:rgba(255,255,255,.95);filter:url(#shadow)}
  .brand{font:900 44px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#071d3b}
  .brand2{fill:#1d4ed8}.eyebrow{font:800 25px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;letter-spacing:4px;fill:#b22234}.title{font:950 78px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#071d3b}.sub{font:750 30px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#475569}.cta{font:900 32px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#fff}.small{font:800 24px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#64748b}.pill{fill:#b22234}.line{stroke:#dfe6ef;stroke-width:3}
</style>
<rect class="bg" width="1080" height="1080"/>
<circle cx="120" cy="130" r="190" fill="#5fa7ff" opacity=".22"/><circle cx="960" cy="900" r="260" fill="#ffffff" opacity=".10"/>
<rect class="card" x="70" y="70" width="940" height="940" rx="52"/>
<text x="120" y="152" class="brand">🦅 Relocation <tspan class="brand2">Manager</tspan></text>
<line x1="120" y1="198" x2="960" y2="198" class="line"/>
<text x="120" y="276" class="eyebrow">COMING SOON</text>
<text x="120" y="390" class="title">Save your lane.</text>
<text x="120" y="478" class="title">Get alerted when</text>
<text x="120" y="566" class="title">work matches.</text>
<text x="120" y="684" class="sub">Set your equipment, lane, and minimum rate per mile</text>
<rect class="pill" x="120" y="850" width="610" height="78" rx="24"/>
<text x="154" y="900" class="cta">Less refreshing. More real work.</text>
<text x="120" y="970" class="small">@relocationmanagerusa</text>
</svg>